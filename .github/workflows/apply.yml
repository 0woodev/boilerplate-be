name: Terraform Apply

on:
  push:
    branches: [dev, main]
    paths:
      - 'terraform/**'
      - 'app/**'
      - 'common/**'
      - 'requirements.txt'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: {{AWS_REGION}}
  PROJECT_NAME: {{PROJECT_NAME}}

jobs:
  apply:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # push된 브랜치 기준으로 stage 결정
      # dev → stage=dev / main → stage=prod
      - name: Set stage
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "STAGE=prod" >> $GITHUB_ENV
          else
            echo "STAGE=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::{{AWS_ACCOUNT_ID}}:role/${{ env.PROJECT_NAME }}-${{ env.STAGE }}-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build Lambda Layer
        run: |
          mkdir -p .build/layer/python
          pip install -r requirements.txt -t .build/layer/python
          cd .build/layer && zip -r ../layer.zip python

      - name: Build Lambda zips
        run: |
          mkdir -p .build
          cd app && zip -r ../.build/user.zip .

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="key=${{ env.PROJECT_NAME }}/${{ env.STAGE }}/terraform.tfstate"

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply \
            -var="stage=${{ env.STAGE }}" \
            -auto-approve
