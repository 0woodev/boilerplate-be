name: Terraform Apply

on:
  push:
    branches: [dev, main]
    paths:
      - 'terraform/**'
      - 'app/**'
      - 'common/**'
      - 'requirements.txt'

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    # dev 브랜치 → dev 환경 변수, main → prod 환경 변수 자동 참조
    environment: ${{ github.ref_name == 'main' && 'prod' || github.ref_name }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      PROJECT_NAME: ${{ vars.PROJECT_NAME }}
      STAGE: ${{ github.ref_name == 'main' && 'prod' || github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ env.PROJECT_NAME }}-${{ env.STAGE }}-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: .build/
          key: build-${{ env.STAGE }}-${{ hashFiles('requirements.txt') }}-${{ github.sha }}
          restore-keys: |
            build-${{ env.STAGE }}-${{ hashFiles('requirements.txt') }}-
            build-${{ env.STAGE }}-

      - name: Build (Lambda zips + Layers)
        run: make all

      - name: Save build cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .build/
          key: build-${{ env.STAGE }}-${{ hashFiles('requirements.txt') }}-${{ github.sha }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ vars.PROJECT_NAME }}/${{ env.STAGE }}/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.PROJECT_NAME }}-tf-lock"

      - name: Terraform Apply
        working-directory: terraform
        run: |
          set -o pipefail
          terraform apply -auto-approve -input=false \
            -var="stage=${{ env.STAGE }}" \
            -var="project_name=${{ vars.PROJECT_NAME }}" \
            -var="aws_region=${{ vars.AWS_REGION }}" \
            -var="aws_account_id=${{ vars.AWS_ACCOUNT_ID }}" \
            -var="github_owner=${{ vars.GH_OWNER }}" \
            -var="tf_state_bucket=${{ vars.TF_STATE_BUCKET }}" \
            -var="fe_url=${{ vars.FE_URL }}" \
            -var="domain=${{ vars.DOMAIN }}" \
            -var="be_domain=${{ vars.BE_DOMAIN }}"
