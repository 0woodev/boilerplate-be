name: Terraform Force Unlock

on:
  workflow_dispatch:
    inputs:
      stage:
        description: '대상 환경 (dev / prod)'
        required: true
        type: choice
        options:
          - dev
          - prod
      lock_id:
        description: 'Lock ID (에러 메시지에서 복사). 비우면 자동 감지 시도.'
        required: false
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  unlock:
    runs-on: ubuntu-latest
    environment: ${{ inputs.stage == 'prod' && 'prod' || inputs.stage }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      PROJECT_NAME: ${{ vars.PROJECT_NAME }}
      STAGE: ${{ inputs.stage }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ env.PROJECT_NAME }}-${{ env.STAGE }}-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ vars.PROJECT_NAME }}/${{ env.STAGE }}/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.PROJECT_NAME }}-tf-lock"

      - name: Detect Lock ID (if not provided)
        id: detect
        if: inputs.lock_id == ''
        working-directory: terraform
        run: |
          # plan 시도해서 lock 에러 메시지에서 ID 추출
          set +e
          output=$(terraform plan -input=false \
            -var="stage=${{ env.STAGE }}" \
            -var="project_name=${{ vars.PROJECT_NAME }}" \
            -var="aws_region=${{ vars.AWS_REGION }}" \
            -var="aws_account_id=${{ vars.AWS_ACCOUNT_ID }}" \
            -var="github_owner=${{ vars.GH_OWNER }}" \
            -var="tf_state_bucket=${{ vars.TF_STATE_BUCKET }}" \
            -var="fe_url=${{ vars.FE_URL }}" \
            -var="domain=${{ vars.DOMAIN }}" \
            -var="be_domain=${{ vars.BE_DOMAIN }}" \
            -no-color 2>&1)
          set -e

          lock_id=$(echo "$output" | grep -oP 'ID:\s+\K[a-f0-9-]+' | head -1)
          if [ -n "$lock_id" ]; then
            echo "lock_id=$lock_id" >> $GITHUB_OUTPUT
            echo "::notice::Detected lock ID: $lock_id"
          else
            echo "::notice::No lock detected. State is not locked."
            echo "lock_id=" >> $GITHUB_OUTPUT
          fi

      - name: Force Unlock
        working-directory: terraform
        run: |
          LOCK_ID="${{ inputs.lock_id || steps.detect.outputs.lock_id }}"
          if [ -z "$LOCK_ID" ]; then
            echo "::notice::No lock ID found. Nothing to unlock."
            exit 0
          fi
          echo "::warning::Force unlocking: $LOCK_ID"
          terraform force-unlock -force "$LOCK_ID"
          echo "::notice::Unlock successful."
