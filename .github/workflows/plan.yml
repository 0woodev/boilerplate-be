name: Terraform Plan

on:
  pull_request:
    branches: [dev, main]
    paths:
      - 'terraform/**'
      - 'app/**'
      - 'common/**'
      - 'requirements.txt'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest
    # PR ļīĆņāü ļĖīļ×£ņ╣ś ĻĖ░ņżĆņ£╝ļĪ£ ĒÖśĻ▓Į Ļ▓░ņĀĢ
    # ŌåÆ dev ļĖīļ×£ņ╣ś ļ│Ćņłś, main ŌåÆ prod ĒÖśĻ▓Į ļ│Ćņłś ņ×ÉļÅÖ ņ░ĖņĪ░
    environment: ${{ github.base_ref == 'main' && 'prod' || github.base_ref }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      PROJECT_NAME: ${{ vars.PROJECT_NAME }}
      STAGE: ${{ github.base_ref == 'main' && 'prod' || github.base_ref }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ env.PROJECT_NAME }}-${{ env.STAGE }}-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build (Lambda zips + Layers)
        run: make all

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ vars.PROJECT_NAME }}/${{ env.STAGE }}/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.PROJECT_NAME }}-tf-lock"

      - name: Terraform Plan
        id: plan
        working-directory: terraform
        run: |
          terraform plan \
            -var="stage=${{ env.STAGE }}" \
            -var="project_name=${{ vars.PROJECT_NAME }}" \
            -var="aws_region=${{ vars.AWS_REGION }}" \
            -var="aws_account_id=${{ vars.AWS_ACCOUNT_ID }}" \
            -var="github_owner=${{ vars.GITHUB_OWNER }}" \
            -var="tf_state_bucket=${{ vars.TF_STATE_BUCKET }}" \
            -var="fe_domain=${{ vars.FE_DOMAIN }}" \
            -no-color 2>&1 | tee plan.txt
        continue-on-error: true

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan.txt', 'utf8');
            const status = '${{ steps.plan.outcome }}' === 'success' ? 'Ō£ģ' : 'ŌØī';
            const body = [
              `## Terraform Plan ${status} ŌĆö \`${{ env.STAGE }}\``,
              '<details><summary>Show Plan</summary>',
              '',
              '```',
              plan.slice(0, 60000),
              '```',
              '</details>'
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
