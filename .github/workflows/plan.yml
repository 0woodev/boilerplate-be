name: Terraform Plan

on:
  pull_request:
    branches: [dev, main]
    paths:
      - 'terraform/**'
      - 'app/**'
      - 'common/**'
      - 'requirements.txt'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest
    # PR 대상 브랜치 기준으로 환경 결정
    # → dev 브랜치 변수, main → prod 환경 변수 자동 참조
    environment: ${{ github.base_ref == 'main' && 'prod' || github.base_ref }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      PROJECT_NAME: ${{ vars.PROJECT_NAME }}
      STAGE: ${{ github.base_ref == 'main' && 'prod' || github.base_ref }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ env.PROJECT_NAME }}-${{ env.STAGE }}-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: .build/
          key: build-${{ env.STAGE }}-${{ hashFiles('requirements.txt') }}-${{ github.sha }}
          restore-keys: |
            build-${{ env.STAGE }}-${{ hashFiles('requirements.txt') }}-
            build-${{ env.STAGE }}-

      - name: Build (Lambda zips + Layers)
        run: make all

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ vars.PROJECT_NAME }}/${{ env.STAGE }}/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.PROJECT_NAME }}-tf-lock"

      - name: Terraform Plan
        id: plan
        working-directory: terraform
        # pipefail 없으면 tee의 exit code(0)가 가려서 terraform 실패 감지 못 함
        shell: bash
        run: |
          set -o pipefail
          terraform plan -input=false \
            -var="stage=${{ env.STAGE }}" \
            -var="project_name=${{ vars.PROJECT_NAME }}" \
            -var="aws_region=${{ vars.AWS_REGION }}" \
            -var="aws_account_id=${{ vars.AWS_ACCOUNT_ID }}" \
            -var="github_owner=${{ vars.GH_OWNER }}" \
            -var="tf_state_bucket=${{ vars.TF_STATE_BUCKET }}" \
            -var="fe_url=${{ vars.FE_URL }}" \
            -var="domain=${{ vars.DOMAIN }}" \
            -var="be_domain=${{ vars.BE_DOMAIN }}" \
            -no-color 2>&1 | tee plan.txt
        continue-on-error: true

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan.txt', 'utf8');
            const status = '${{ steps.plan.outcome }}' === 'success' ? '✅' : '❌';
            const body = [
              `## Terraform Plan ${status} — \`${{ env.STAGE }}\``,
              '<details><summary>Show Plan</summary>',
              '',
              '```',
              plan.slice(0, 60000),
              '```',
              '</details>'
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
