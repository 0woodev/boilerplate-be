name: Terraform Apply

on:
  push:
    branches: [dev, main]
    paths:
      - 'terraform/**'
      - 'app/**'
      - 'common/**'
      - 'requirements.txt'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME }}

jobs:
  apply:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # push된 브랜치 기준으로 stage 결정
      # dev → stage=dev / main → stage=prod
      - name: Set stage
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "STAGE=prod" >> $GITHUB_ENV
          else
            echo "STAGE=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ env.PROJECT_NAME }}-${{ env.STAGE }}-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build (Lambda zips + Layers)
        run: make all

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ vars.PROJECT_NAME }}/${{ env.STAGE }}/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.PROJECT_NAME }}-tf-lock"

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="stage=${{ env.STAGE }}" \
            -var="project_name=${{ vars.PROJECT_NAME }}" \
            -var="aws_region=${{ vars.AWS_REGION }}" \
            -var="aws_account_id=${{ vars.AWS_ACCOUNT_ID }}" \
            -var="github_owner=${{ vars.GITHUB_OWNER }}" \
            -var="fe_domain=https://${{ vars.FE_DOMAIN }}"
