name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: '삭제 확인 (yes 입력)'
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || github.ref_name }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      PROJECT_NAME: ${{ vars.PROJECT_NAME }}
      STAGE: ${{ github.ref_name == 'main' && 'prod' || github.ref_name }}

    steps:
      - name: Validate confirm input
        run: |
          if [ "${{ inputs.confirm }}" != "yes" ]; then
            echo "❌ 삭제 확인 실패. 'yes' 를 입력하세요."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ env.PROJECT_NAME }}-${{ env.STAGE }}-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build (Lambda zips + Layers)
        run: make all

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ vars.PROJECT_NAME }}/${{ env.STAGE }}/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.PROJECT_NAME }}-tf-lock"

      - name: Terraform Destroy
        working-directory: terraform
        run: |
          terraform destroy -auto-approve \
            -var="stage=${{ env.STAGE }}" \
            -var="project_name=${{ vars.PROJECT_NAME }}" \
            -var="aws_region=${{ vars.AWS_REGION }}" \
            -var="aws_account_id=${{ vars.AWS_ACCOUNT_ID }}" \
            -var="github_owner=${{ vars.GH_OWNER }}" \
            -var="tf_state_bucket=${{ vars.TF_STATE_BUCKET }}" \
            -var="fe_domain=${{ vars.FE_DOMAIN }}" \
            -var="domain=${{ vars.DOMAIN }}" \
            -var="be_domain=${{ vars.BE_DOMAIN }}"
